<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — The Tailor's Daughter</title>
  <link rel="icon" href="assets/images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0c0b09;
      --text: #1a1a18;
      --text-light: #6b6860;
      --gold: #c9a84c;
      --accent: #8b6914;
      --white: #ffffff;
      --red: #a63d2f;
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Montserrat', -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-dark);
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .login-box {
      background: var(--white);
      padding: 56px 48px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .login-box img {
      height: 64px;
      margin: 0 auto 32px;
    }
    .login-box h1 {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 300;
      margin-bottom: 8px;
    }
    .login-box h1 em {
      color: var(--gold);
      font-style: italic;
    }
    .login-box p {
      font-size: 13px;
      color: var(--text-light);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .login-box input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(0,0,0,0.1);
      font-family: var(--font-body);
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.3s;
      background: #f4f2ef;
      color: var(--text);
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-btn {
      width: 100%;
      padding: 16px;
      background: var(--bg-dark);
      color: var(--white);
      border: none;
      font-family: var(--font-body);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s;
    }
    .login-btn:hover { background: var(--accent); }
    .login-error {
      color: var(--red);
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }
    .back-link {
      display: inline-block;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-light);
      text-decoration: none;
      transition: color 0.3s;
    }
    .back-link:hover { color: var(--accent); }
    @media (max-width: 480px) {
      .login-box { padding: 40px 28px; }
    }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="assets/images/logo.png" alt="The Tailor's Daughter">
    <h1>The Tailor's <em>Daughter</em></h1>
    <p>Sign in to access the supplier portal or admin dashboard.</p>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit" class="login-btn">Sign In</button>
    </form>
    <p class="login-error" id="loginError">Invalid credentials. Please try again.</p>
    <a href="/" class="back-link">Back to main site</a>
  </div>

  <script>
    // Clear any stale sessions
    // (user can also come here to switch accounts)

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      var username = document.getElementById('username').value.trim();
      var password = document.getElementById('password').value.trim();
      var errorEl = document.getElementById('loginError');

      // Admin login
      if (username === 'admin' && password === 'admin') {
        var adminToken = 'td-admin-' + btoa('tailorsdaughter2026');
        localStorage.setItem('td-admin-token', adminToken);
        errorEl.style.display = 'none';
        window.location.href = '/admin.html';
        return;
      }

      // Supplier login
      if (username === 'supplier' && password === 'supplier') {
        localStorage.setItem('td-supplier-token', 'authenticated');
        errorEl.style.display = 'none';
        window.location.href = '/shop.html';
        return;
      }

      // Invalid
      errorEl.style.display = 'block';
    });
  </script>
</body>
</html>
